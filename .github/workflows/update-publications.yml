name: Update Publications from Google Scholar

on:
  schedule:
    - cron: "0 0 1,15 * *"  # 매월 1일, 15일 자정 실행 (2주마다)
  workflow_dispatch:          # 수동 실행 버튼

jobs:
  update-publications:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # 파일 커밋 권한

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install scholarly

      - name: Run publication updater
        run: python scripts/update_publications.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet content/publications/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if updated
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/publication/
          git commit -m "📚 Auto-update publications $(date +'%Y-%m-%d')"
          git push
