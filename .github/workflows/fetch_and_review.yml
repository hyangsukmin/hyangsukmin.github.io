name: 📚 Fetch and Review arXiv Papers

on:
  workflow_dispatch:
  schedule:
    - cron: "0 21 * * *"  # 매일 KST 06:00 / UTC 21:00

permissions:
  contents: write

jobs:
  fetch-and-review:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install requests anthropic

      - name: 🔍 Fetch papers and generate reviews
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/fetch_and_review.py

      - name: 💾 Commit generated digest
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add content/post data/reviewed_ids.json || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add daily arXiv digest"
            git push
          fi
