name: 📚 Daily arxiv Paper Review
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  review-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: 🐍 Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Python 패키지 설치
        run: pip install anthropic requests

      - name: 🔍 논문 검색 & AI 리뷰 생성
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/fetch_and_review.py

      - name: 🏗️ Hugo 설치
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: 📦 Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 📦 npm 패키지 설치 (TailwindCSS 포함)
        run: npm install

      - name: 🔨 Hugo 빌드
        run: hugo --minify

      - name: 🚀 커밋 & 푸시 (소스)
        run: |
          git config user.email "paperbot@github.com"
          git config user.name "Paper Review Bot"
          git add content/post/ data/
          git diff --staged --quiet && echo "변경사항 없음" && exit 0
          git commit -m "📚 $(date '+%Y-%m-%d') 논문 리뷰 자동 업데이트"
          git push origin HEAD:main --force-with-lease

      - name: 🌐 Deploy workflow 트리거
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy.yml/dispatches \
            -d '{"ref":"main"}'
