name: 📚 Daily arxiv Paper Review
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
  actions: write
jobs:
  review-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: 📥 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: 🐍 Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Python 패키지 설치
        run: pip install anthropic requests

      - name: 🔍 논문 검색 & AI 리뷰 생성
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/fetch_and_review.py

      - name: 🚀 소스 커밋 & 푸시
        run: |
          git config user.email "paperbot@github.com"
          git config user.name "Paper Review Bot"
          git add content/post/ data/
          git diff --staged --quiet && echo "변경사항 없음" && exit 0
          git commit -m "📚 $(date '+%Y-%m-%d') 논문 리뷰 자동 업데이트"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main

      - name: 🏗️ Hugo 설치
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: 📦 Node.js & npm 설치
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 📦 npm 패키지 설치
        run: npm install

      - name: 🔨 Hugo 빌드
        run: hugo --minify --baseURL "https://hyangsukmin.github.io/"

      - name: 📤 Pages 아티팩트 업로드
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./public

      - name: 🌐 GitHub Pages 배포
        uses: actions/deploy-pages@v4
